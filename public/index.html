<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASSCORE — Plant Condition Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8320A; --red-dim: rgba(232,50,10,0.15);
  --yellow: #F5A623; --yellow-dim: rgba(245,166,35,0.15);
  --green: #2ECC71; --green-dim: rgba(46,204,113,0.12);
  --bg: #080808; --bg2: #0f0f0f; --bg3: #141414; --bg4: #1a1a1a;
  --border: #2a2a2a; --border2: #333333;
  --text: #e8e8e8; --text-dim: #888; --text-mid: #bbb;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px); background-size:32px 32px; pointer-events:none; z-index:0; }

/* HEADER */
header { position:relative; z-index:10; border-bottom:1px solid var(--border); background:var(--bg2); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:60px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-text .mass { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; letter-spacing:3px; line-height:1; }
.logo-text .mass span.core { color:var(--red); }
.logo-text .mass span.mass { color:#fff; }
.logo-text .sub { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:3px; color:var(--text-dim); margin-top:2px; }
.header-right { display:flex; align-items:center; gap:16px; }
.live-badge { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--green); border:1px solid rgba(46,204,113,0.3); padding:4px 10px; }
.header-date { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); letter-spacing:1px; }

/* SITE SELECTOR */
.site-selector-bar { position:relative; z-index:9; background:var(--bg3); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; gap:16px; height:48px; }
.site-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:#cccccc; text-transform:uppercase; white-space:nowrap; }
.site-select-wrap { position:relative; }
select.site-dropdown {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:#fff;
  background:var(--bg4); border:1px solid var(--border2); padding:8px 36px 8px 14px;
  cursor:pointer; appearance:none; -webkit-appearance:none; outline:none;
  text-transform:uppercase; min-width:260px;
}
select.site-dropdown:focus { border-color:var(--red); }
.select-arrow { position:absolute; right:12px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--red); font-size:10px; }

/* ALERT BANNER */
.alert-banner { position:relative; z-index:8; padding:10px 32px; display:flex; align-items:center; gap:12px; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; }
.alert-banner.critical { background:rgba(232,50,10,0.12); border-bottom:1px solid rgba(232,50,10,0.3); color:var(--red); }
.alert-banner.clear { background:rgba(46,204,113,0.08); border-bottom:1px solid rgba(46,204,113,0.2); color:var(--green); }
.alert-dot { width:8px; height:8px; border-radius:50%; background:currentColor; animation:pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* SITE BANNER */
.site-banner { position:relative; z-index:5; background:var(--bg3); border-bottom:1px solid var(--border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; }
.site-banner::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--red); }
.site-info .site-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:#bbbbbb; text-transform:uppercase; margin-bottom:3px; }
.site-info .site-name { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:3px; color:#fff; line-height:1; }
.site-info .site-meta { font-size:12px; color:var(--text-dim); margin-top:3px; }
.site-info .site-meta span { color:var(--text-mid); }

/* MAIN */
main { position:relative; z-index:5; padding:24px 32px; display:flex; flex-direction:column; gap:24px; }

/* SECTION LABEL */
.section-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:#dddddd; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }
.section-label .slabel-badge { font-size:9px; padding:2px 8px; border:1px solid var(--border2); color:#aaaaaa; }

/* SCORE ROW */
.score-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:stretch; }
.score-right-stack { display:flex; flex-direction:column; gap:16px; }
.score-main-card { flex:1; justify-content:center; }

.score-side-card { background:var(--bg2); border:1px solid var(--border); padding:20px 24px; position:relative; }
.score-side-card .card-lbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:#dddddd; text-transform:uppercase; margin-bottom:8px; }
.score-side-card .score-big { font-family:'Orbitron',monospace; font-size:48px; font-weight:900; line-height:1; }
.score-side-card .score-sublbl { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
.score-side-card .score-bar { height:4px; background:var(--border2); margin-top:12px; position:relative; }
.score-side-card .score-bar-fill { height:100%; position:absolute; top:0; left:0; transition:width 1s ease; }
.score-side-card .score-desc { font-size:13px; color:#999999; margin-top:10px; line-height:1.5; }

.score-main-card { background:var(--bg2); border:1px solid var(--border); padding:32px 24px; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-main-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.score-ring-wrap { display:flex; flex-direction:column; align-items:center; gap:20px; }
.score-ring { position:relative; width:200px; height:200px; }
.score-ring svg { transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--border2); stroke-width:10; }
.ring-fill { fill:none; stroke-width:10; stroke-linecap:round; stroke-dasharray:534; stroke-dashoffset:534; transition:stroke-dashoffset 1.5s ease; }
.score-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-num { font-family:'Orbitron',monospace; font-size:64px; font-weight:900; color:#fff; line-height:1; }
.score-max { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:4px; }
.score-status-lbl { font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:3px; text-transform:uppercase; text-align:center; }
.pcs-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:#dddddd; text-transform:uppercase; margin-bottom:12px; }

/* PLAIN LANGUAGE SUMMARY */
.plain-summary { background:var(--bg2); border:1px solid var(--border); border-left:4px solid var(--text-dim); padding:16px 20px; }
.plain-summary.good { border-left-color:var(--green); }
.plain-summary.attention { border-left-color:var(--yellow); }
.plain-summary.critical-state { border-left-color:var(--red); }
.plain-summary .ps-title { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:#dddddd; text-transform:uppercase; margin-bottom:8px; }
.plain-summary .ps-text { font-size:15px; color:#e0e0e0; line-height:1.6; font-weight:500; }

/* STATUS SECTIONS */
.status-section { background:var(--bg2); border:1px solid var(--border); }
.status-header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.status-header .sh-title { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; letter-spacing:1px; color:#ffffff; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.status-dot.green { background:var(--green); }
.status-dot.yellow { background:var(--yellow); }
.status-dot.red { background:var(--red); }
.sh-count { font-family:'Share Tech Mono',monospace; font-size:8px; padding:3px 10px; text-transform:uppercase; }
.sh-count.green { color:var(--green); border:1px solid rgba(46,204,113,0.3); background:var(--green-dim); }
.sh-count.yellow { color:var(--yellow); border:1px solid rgba(245,166,35,0.3); background:var(--yellow-dim); }
.sh-count.red { color:var(--red); border:1px solid rgba(232,50,10,0.4); background:var(--red-dim); }

/* ASSET ROWS */
.asset-row { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
.asset-row:last-child { border-bottom:none; }
.asset-row-name { font-size:14px; font-weight:600; color:#ffffff; flex:1; letter-spacing:0.3px; }
.asset-row-system { font-size:11px; color:var(--text-dim); width:160px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; }
.asset-score-wrap { display:flex; align-items:center; gap:8px; }
.asset-score-num { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; width:36px; }
.asset-mini-bar { width:80px; height:3px; background:var(--border2); position:relative; }
.asset-mini-fill { height:100%; position:absolute; top:0; left:0; }
.asset-status-pill { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:1px; padding:3px 8px; text-transform:uppercase; }
.pill-green { color:var(--green); border:1px solid rgba(46,204,113,0.3); background:var(--green-dim); }
.pill-yellow { color:var(--yellow); border:1px solid rgba(245,166,35,0.3); background:var(--yellow-dim); }
.pill-red { color:var(--red); border:1px solid rgba(232,50,10,0.4); background:var(--red-dim); }
.empty-msg { padding:24px 20px; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; text-align:center; }

/* TWO COL */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* FINDINGS */
.finding-row { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:14px; }
.finding-row:last-child { border-bottom:none; }
.finding-bar { width:3px; height:44px; flex-shrink:0; margin-top:2px; }
.finding-bar.critical { background:var(--red); }
.finding-bar.high { background:var(--yellow); }
.finding-bar.moderate { background:var(--text-mid); }
.finding-content { flex:1; }
.finding-title { font-size:15px; font-weight:700; color:#ffffff; margin-bottom:4px; }
.finding-cat { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px; color:#999999; text-transform:uppercase; }
.finding-cat span { color:var(--text-mid); margin-right:10px; }
.finding-pill { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:1px; padding:3px 8px; text-transform:uppercase; align-self:center; }

/* WHAT THIS MEANS */
.plain-explain { padding:14px 20px; border-top:1px solid var(--border); }
.plain-explain .pe-lbl { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
.plain-explain .pe-text { font-size:13px; color:var(--text-mid); line-height:1.6; }

/* RECOMMENDED ACTIONS */
.action-row { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
.action-row:last-child { border-bottom:none; }
.action-priority { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:1px; padding:3px 8px; text-transform:uppercase; white-space:nowrap; }
.action-text { flex:1; font-size:14px; color:#dddddd; font-weight:500; }
.action-cost { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); white-space:nowrap; }

/* VALVE GRID */
.valve-row { display:grid; grid-template-columns:80px 1fr 100px 90px; gap:8px; align-items:center; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); margin-bottom:6px; }
.valve-row:last-child { margin-bottom:0; }
.valve-id { font-family:'Share Tech Mono',monospace; font-size:11px; color:#cccccc; font-weight:600; }
.valve-asset { font-size:14px; font-weight:600; color:#ffffff; }
.valve-expiry { font-family:'Share Tech Mono',monospace; font-size:11px; color:#bbbbbb; text-align:center; }
.valve-status-expired { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--red); text-align:right; font-weight:700; }
.valve-status-ok { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--green); text-align:right; font-weight:700; }

/* COMPRESSOR */
.comp-header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.comp-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); }
.comp-cell { background:var(--bg3); padding:14px 18px; }
.comp-lbl { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:5px; }
.comp-val { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:#fff; line-height:1; }
.comp-val.flag-red { color:var(--red); }
.comp-val.flag-yellow { color:var(--yellow); }
.comp-val.flag-green { color:var(--green); }
.comp-unit { font-family:'Share Tech Mono',monospace; font-size:7px; color:var(--text-dim); margin-top:2px; }
.comp-status { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:1px; margin-top:5px; text-transform:uppercase; }
.comp-status.normal { color:var(--green); }
.comp-status.attention { color:var(--yellow); }
.comp-status.critical-s { color:var(--red); }

/* SNAPSHOT */
.snap-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.snap-row:last-child { border-bottom:none; }
.snap-date { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); width:100px; }
.snap-score { font-family:'Orbitron',monospace; font-size:18px; font-weight:700; width:50px; }
.snap-bar { flex:1; height:3px; background:var(--border2); position:relative; }
.snap-fill { height:100%; position:absolute; top:0; left:0; }

/* LOADING */
.loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:400px; gap:16px; position:relative; z-index:5; }
.spinner { width:36px; height:36px; border:2px solid var(--border2); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-txt { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; }

/* FOOTER */
footer { position:relative; z-index:5; border-top:1px solid var(--border); padding:14px 32px; display:flex; align-items:center; justify-content:space-between; background:var(--bg2); margin-top:20px; }
.footer-txt { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.animate { animation:fadeUp 0.4s ease forwards; opacity:0; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-text">
      <div class="mass"><span class="mass">MASS</span><span class="core">CORE</span></div>
      <div class="sub">Mechanical Assessment Scoring System</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">● Live Dashboard</div>
    <div class="header-date" id="header-date"></div>
  </div>
</header>

<div class="site-selector-bar">
  <div class="site-label">Select Site</div>
  <div class="site-select-wrap">
    <select class="site-dropdown" id="site-dropdown" onchange="selectSite(this.value)">
      <option value="">— Select a site —</option>
    </select>
    <div class="select-arrow">▼</div>
  </div>
</div>

<div id="alert-banner"></div>

<div class="site-banner" id="site-banner" style="display:none">
  <div class="site-info">
    <div class="site-lbl">Active Site</div>
    <div class="site-name" id="banner-name">—</div>
    <div class="site-meta" id="banner-meta"></div>
  </div>
</div>

<div id="dashboard-content">
  <div class="loading-state">
    <div class="spinner"></div>
    <div class="loading-txt">Connecting to MASSCORE Database</div>
  </div>
</div>

<footer>
  <div class="footer-txt">MASSCORE — Mechanical Assessment Scoring System — Confidential</div>
  <div class="footer-txt" id="footer-right">—</div>
</footer>

<script>
const $ = id => document.getElementById(id);

// ── COLOR HELPERS ────────────────────────────────────────
function scoreColor(s) {
  if (s === null || s === undefined) return 'var(--text-dim)';
  return s >= 80 ? 'var(--green)' : s >= 60 ? 'var(--yellow)' : 'var(--red)';
}
function scoreClass(s) {
  if (s === null || s === undefined) return '';
  return s >= 80 ? 'good' : s >= 60 ? 'attention' : 'critical-state';
}
function scoreLabel(s) {
  if (s === null || s === undefined) return 'No Data';
  return s >= 80 ? 'Operational' : s >= 60 ? 'Attention Required' : 'Critical';
}
function pillClass(s) {
  if (s === null || s === undefined) return '';
  return s >= 80 ? 'pill-green' : s >= 60 ? 'pill-yellow' : 'pill-red';
}
function fmt(v, d=1) {
  if (v === null || v === undefined || v === '') return '—';
  return typeof v === 'number' ? v.toFixed(d) : v;
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
}
function yearsOverdue(s) {
  if (!s) return null;
  const d = new Date(s);
  if (d >= new Date()) return null;
  return Math.floor((new Date()-d)/(1000*60*60*24*365));
}
function buildMap(records) {
  const m={};
  if(records) records.forEach(r=>{m[r.id]=r;});
  return m;
}
function fval(f,...keys) {
  for(const k of keys) if(f[k]!==undefined&&f[k]!==null&&f[k]!=='') return f[k];
  return null;
}

// ── STATE ────────────────────────────────────────────────
let D=null, M={}, activeSite=null;

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async()=>{
  $('header-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}).toUpperCase();
  try {
    const res = await fetch('/api/data');
    D = await res.json();
    M.sites     = buildMap(D.sites?.records);
    M.systems   = buildMap(D.systems?.records);
    M.assets    = buildMap(D.assets?.records);
    M.findings  = buildMap(D.findings?.records);
    M.valves    = buildMap(D.valves?.records);
    M.readings  = buildMap(D.readings?.records);
    M.snapshots = buildMap(D.snapshots?.records);
    M.customers = buildMap(D.customers?.records);
    buildDropdown();
  } catch(e) {
    $('dashboard-content').innerHTML = `<div class="loading-state"><div style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--red);text-transform:uppercase">Failed to load — check server connection</div></div>`;
  }
});

function buildDropdown() {
  const sites = D.sites?.records || [];
  const sel = $('site-dropdown');
  sites.forEach(site=>{
    const opt = document.createElement('option');
    opt.value = site.id;
    opt.textContent = fval(site.fields,'Name','Site Name') || 'Unknown Site';
    sel.appendChild(opt);
  });
  if(sites.length===1) { sel.value=sites[0].id; selectSite(sites[0].id); }
}

function selectSite(id) {
  if(!id) { $('site-banner').style.display='none'; $('alert-banner').innerHTML=''; $('dashboard-content').innerHTML=''; return; }
  activeSite=id;
  const site=M.sites[id];
  if(!site) return;
  const f=site.fields;
  const name=fval(f,'Name','Site Name')||'Site';
  const city=fval(f,'City')||''; const state=fval(f,'State')||'';

  $('banner-name').textContent=name;
  $('banner-meta').innerHTML=city?`<span>Location:</span> ${city}${state?', '+state:''}`:'';
  $('site-banner').style.display='flex';
  $('footer-right').textContent=`Generated ${new Date().toLocaleDateString('en-US')} — ${name} — MASSCORE v2.0`;

  renderDashboard(id);
}

function renderDashboard(siteId) {
  const site=M.sites[siteId];
  const f=site.fields;
  const name=fval(f,'Name','Site Name')||'Site';

  const plantScore=fval(f,'Plant Condition Score (New)','Plant Condition Score','Score');
  const infraScore=fval(f,'Infrastructure Score');
  const relScore=fval(f,'Reliability Score');

  // Systems
  const siteSystems=(D.systems?.records||[]).filter(s=>(s.fields['Site']||s.fields['Sites']||[]).includes(siteId));
  const sysIds=siteSystems.map(s=>s.id);

  // Assets
  const sysNames=siteSystems.map(s=>fval(s.fields,'Name','System Name')||'');
  const siteAssets=(D.assets?.records||[]).filter(a=>{
    const linked=a.fields['System']||a.fields['Systems']||[];
    return linked.some(id=>sysIds.includes(id)||sysNames.includes(id));
  });
  const assetIds=siteAssets.map(a=>a.id);

  // Findings open
  const findings=(D.findings?.records||[]).filter(fd=>{
    const linked=fd.fields['Site']||fd.fields['Sites']||[];
    const status=(fd.fields['Status']||'').toUpperCase();
    return linked.includes(siteId) && status!=='RESOLVED';
  });

  // Valves
  const valves=(D.valves?.records||[]).filter(v=>{
    const vSite=v.fields['Site']||'';
    const siteName=fval(site.fields,'Name','Site Name')||'';
    if(Array.isArray(vSite)) return vSite.includes(siteId)||vSite.includes(siteName);
    return vSite===siteName||vSite===siteId;
  });
  const expiredValves=valves.filter(v=>{
    const exp=fval(v.fields,'Expiry Date','Expiration Date','Last Test Date');
    return exp && new Date(exp)<new Date();
  });

  // Readings
  const readingMap={};
  (D.readings?.records||[]).forEach(r=>{
    const aids=r.fields['Asset']||r.fields['Assets']||[];
    aids.forEach(aid=>{
      if(!assetIds.includes(aid)) return;
      const date=fval(r.fields,'Date','Reading Date')||'';
      if(!readingMap[aid]||date>(fval(readingMap[aid].fields,'Date','Reading Date')||'')) readingMap[aid]=r;
    });
  });

  // Snapshots
  const snapshots=(D.snapshots?.records||[]).filter(sn=>(sn.fields['Site']||sn.fields['Sites']||[]).includes(siteId))
    .sort((a,b)=>{const da=fval(a.fields,'Date','Assessment Date')||'';const db=fval(b.fields,'Date','Assessment Date')||'';return db>da?1:-1;})
    .slice(0,5);

  // Bucket assets
  const goodAssets=siteAssets.filter(a=>(fval(a.fields,'Asset Infrastructure Score')??null)>=80);
  const attentionAssets=siteAssets.filter(a=>{const s=fval(a.fields,'Asset Infrastructure Score')??null;return s!==null&&s>=60&&s<80;});
  const criticalAssets=siteAssets.filter(a=>{const s=fval(a.fields,'Asset Infrastructure Score')??null;return s!==null&&s<60;});
  const noDataAssets=siteAssets.filter(a=>fval(a.fields,'Asset Infrastructure Score')===null);

  // Bucket findings
  const sevOrder={CRITICAL:0,HIGH:1,MODERATE:2,LOW:3};
  const sortedFindings=[...findings].sort((a,b)=>(sevOrder[(a.fields['Severity']||'').toUpperCase()]??9)-(sevOrder[(b.fields['Severity']||'').toUpperCase()]??9));
  const critFindings=findings.filter(fd=>(fd.fields['Severity']||'').toUpperCase()==='CRITICAL');

  // Alert banner
  const alertBanner=$('alert-banner');
  if(critFindings.length>0||expiredValves.length>0) {
    let msgs=[];
    if(critFindings.length>0) msgs.push(`${critFindings.length} Critical Finding${critFindings.length>1?'s':''} Require Immediate Attention`);
    if(expiredValves.length>0) msgs.push(`${expiredValves.length} Expired Relief Valve${expiredValves.length>1?'s':''} — Compliance Action Required`);
    if(expiringValves.length>0) msgs.push(`${expiringValves.length} Relief Valve${expiringValves.length>1?'s':''} Expiring Soon — Schedule Replacement`);
    alertBanner.className='alert-banner critical';
    alertBanner.innerHTML=`<div class="alert-dot"></div><span>${msgs.join(' &nbsp;|&nbsp; ')}</span>`;
  } else {
    alertBanner.className='alert-banner clear';
    alertBanner.innerHTML=`<div class="alert-dot"></div><span>No Critical Issues — All Systems Monitored</span>`;
  }

  // Plain language summary
  function plainSummaryText(score) {
    if(score===null) return 'Assessment data is being collected. Scores will populate as inspections are completed.';
    if(score>=80) return `This facility is in good operational condition with a score of ${Math.round(score)} out of 100. Regular maintenance should continue as scheduled.`;
    if(score>=60) return `This facility scored ${Math.round(score)} out of 100 and requires attention. Several assets and systems need scheduled maintenance or repair to prevent further deterioration.`;
    return `This facility scored ${Math.round(score)} out of 100 and is in critical condition. Immediate action is required to address safety, compliance, and mechanical issues before they result in equipment failure or regulatory violations.`;
  }

  let html='<main>';

  // ── SCORES ──
  const pc=scoreColor(plantScore);
  const pdo=plantScore!==null?376-(plantScore/100)*376:376;
  const rc=scoreColor(relScore);
  const rbw=relScore!==null?Math.round(relScore):0;
  const ic=scoreColor(infraScore);
  const ibw=infraScore!==null?Math.round(infraScore):0;

  html+=`<div><div class="section-label">Plant Condition Overview</div>
  <div class="score-row">

    <!-- LEFT: Plant Condition Score large -->
    <div class="score-main-card animate" style="animation-delay:0.1s">
      <div class="pcs-label">Plant Condition Score</div>
      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle class="ring-bg" cx="100" cy="100" r="85"/>
            <circle class="ring-fill" cx="100" cy="100" r="85" id="main-ring" style="stroke:${pc};stroke-dashoffset:534"/>
          </svg>
          <div class="score-center">
            <div class="score-num">${plantScore!==null?Math.round(plantScore):'—'}</div>
            <div class="score-max">/ 100</div>
          </div>
        </div>
        <div class="score-status-lbl" style="color:${pc}">${scoreLabel(plantScore)}</div>
      </div>
    </div>

    <!-- RIGHT: Reliability + Infrastructure stacked -->
    <div class="score-right-stack">
      <div class="score-side-card animate" style="animation-delay:0.15s">
        <div class="card-lbl">Reliability Score — How It's Operating Right Now</div>
        <div class="score-big" style="color:${rc}">${relScore!==null?Math.round(relScore):'—'}</div>
        <div class="score-sublbl" style="color:${rc}">${scoreLabel(relScore)}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${rbw}%;background:${rc}"></div></div>
        <div class="score-desc">Based on live compressor readings and equipment performance data.</div>
      </div>
      <div class="score-side-card animate" style="animation-delay:0.2s">
        <div class="card-lbl">Infrastructure Score — Physical Condition</div>
        <div class="score-big" style="color:${ic}">${infraScore!==null?Math.round(infraScore):'—'}</div>
        <div class="score-sublbl" style="color:${ic}">${scoreLabel(infraScore)}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${ibw}%;background:${ic}"></div></div>
        <div class="score-desc">Based on asset condition, findings, and compliance status.</div>
      </div>
    </div>

  </div></div>`;

  // Plain summary
  html+=`<div class="plain-summary ${scoreClass(plantScore)} animate" style="animation-delay:0.25s">
    <div class="ps-title">What This Means For You</div>
    <div class="ps-text">${plainSummaryText(plantScore)}</div>
  </div>`;

  // ── SYSTEMS BREAKDOWN ──
  html+=`<div><div class="section-label">System Health Breakdown</div>`;

  siteSystems.forEach((sys,si)=>{
    const sf=sys.fields;
    const sysName=fval(sf,'Name','System Name')||'System';
    const sysScore=fval(sf,'System Infrastructure Score','Weighted System Health Score','System Health Score');
    const sysCrit=fval(sf,'System Criticality','Criticality')||'';
    const sc2=scoreColor(sysScore);
    const sbw=sysScore!==null?Math.round(sysScore):0;

    // Assets in this system
    const sysAssets=siteAssets.filter(a=>{
      const linked=a.fields['System']||a.fields['Systems']||[];
      return linked.includes(sys.id)||linked.includes(sysName);
    });
    const sysGood=sysAssets.filter(a=>(fval(a.fields,'Asset Infrastructure Score')??null)>=80);
    const sysBad=sysAssets.filter(a=>{const s=fval(a.fields,'Asset Infrastructure Score')??null;return s!==null&&s<80;}).sort((a,b)=>(fval(a.fields,'Asset Infrastructure Score')??100)-(fval(b.fields,'Asset Infrastructure Score')??100));

    html+=`<div class="status-section animate" style="animation-delay:${0.3+si*0.05}s;margin-bottom:16px">
      <div class="status-header">
        <div class="sh-title">
          <div class="status-dot ${sysScore>=80?'green':sysScore>=60?'yellow':'red'}"></div>
          ${sysName}
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim)">System Score</div>
          <div style="font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:${sc2}">${sysScore!==null?Math.round(sysScore):'—'}</div>
        </div>
      </div>
      <div style="padding:0 20px 4px">
        <div style="height:3px;background:var(--border2);position:relative;margin:8px 0 12px">
          <div style="height:100%;position:absolute;top:0;left:0;width:${sbw}%;background:${sc2};transition:width 1s ease"></div>
        </div>
      </div>`;

    // Confirmed operational count
    if(sysGood.length>0) {
      html+=`<div style="padding:8px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
        <div style="width:6px;height:6px;border-radius:50%;background:var(--green)"></div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green);letter-spacing:1px">${sysGood.length} asset${sysGood.length>1?'s':''} confirmed operational — no action required</div>
      </div>`;
    }

    // Problem assets
    if(sysBad.length>0) {
      sysBad.forEach(a=>{
        const af=a.fields;
        const aName=fval(af,'Asset Name','Name')||'Unknown Asset';
        const hs=fval(af,'Asset Infrastructure Score')??null;
        const hc=hs>=60?'yellow':'red';
        const hcolor=hs>=60?'var(--yellow)':'var(--red)';
        html+=`<div class="asset-row">
          <div class="asset-row-name">${aName}</div>
          <div class="asset-score-wrap">
            <span class="asset-score-num" style="color:${hcolor}">${hs!==null?Math.round(hs):'—'}</span>
            <div class="asset-mini-bar"><div class="asset-mini-fill" style="width:${hs??0}%;background:${hcolor}"></div></div>
          </div>
          <span class="asset-status-pill pill-${hc}">${hs>=60?'Attention Required':'Critical'}</span>
        </div>`;
      });
    } else if(sysGood.length===0) {
      html+=`<div class="empty-msg">No asset scores recorded for this system yet</div>`;
    }

    html+=`</div>`;
  });

  html+=`</div>`;

  // ── LIFE & SAFETY FINDINGS ──
  const lifeSafetyFindings=sortedFindings.filter(fd=>(fd.fields['Category']||'').toUpperCase()==='LIFE & SAFETY');
  const otherFindings=sortedFindings.filter(fd=>(fd.fields['Category']||'').toUpperCase()!=='LIFE & SAFETY');

  if(sortedFindings.length>0) {
    html+=`<div><div class="section-label">Active Findings</div>
    <div class="two-col">`;

    // Life & Safety
    html+=`<div class="status-section animate" style="animation-delay:0.5s">
      <div class="status-header">
        <div class="sh-title"><div class="status-dot red"></div>Life & Safety — Priority Response Required</div>
        <div class="sh-count ${lifeSafetyFindings.length>0?'red':'green'}">${lifeSafetyFindings.length>0?lifeSafetyFindings.length+' Open':'None'}</div>
      </div>`;

    if(lifeSafetyFindings.length===0) {
      html+=`<div class="empty-msg" style="color:var(--green)">✓ No Life & Safety findings open</div>`;
    } else {
      html+=`<div class="plain-explain"><div class="pe-lbl">What This Means</div><div class="pe-text">Life & Safety findings represent immediate risk to personnel and regulatory compliance. These must be addressed before any other maintenance work.</div></div>`;
      lifeSafetyFindings.forEach(fd=>{
        const ff=fd.fields;
        const title=fval(ff,'Finding Title','Title','Name')||'Untitled Finding';
        const sev=(ff['Severity']||'').toUpperCase();
        const aids=ff['Asset']||ff['Assets']||[];
        const aName=aids.length?(M.assets[aids[0]]?.fields['Asset Name']||M.assets[aids[0]]?.fields['Name']||'—'):'—';
        const status=fval(ff,'Status')||'Open';
        const rec=fval(ff,'Recommended Action')||'';
        html+=`<div class="finding-row">
          <div class="finding-bar critical"></div>
          <div class="finding-content">
            <div class="finding-title">${title}</div>
            <div class="finding-cat"><span>Asset:</span>${aName}&nbsp;&nbsp;<span>Status:</span>${status}</div>
            ${rec?`<div class="finding-cat" style="margin-top:4px;color:var(--text-mid)">${rec}</div>`:''}
          </div>
          <span class="finding-pill pill-red">${sev.charAt(0)+sev.slice(1).toLowerCase()}</span>
        </div>`;
      });
    }
    html+=`</div>`;

    // Other findings
    html+=`<div class="status-section animate" style="animation-delay:0.55s">
      <div class="status-header">
        <div class="sh-title"><div class="status-dot yellow"></div>Mechanical & Energy Findings</div>
        <div class="sh-count ${otherFindings.length>0?'yellow':'green'}">${otherFindings.length>0?otherFindings.length+' Open':'None'}</div>
      </div>`;

    if(otherFindings.length===0) {
      html+=`<div class="empty-msg" style="color:var(--green)">✓ No open mechanical or energy findings</div>`;
    } else {
      otherFindings.forEach(fd=>{
        const ff=fd.fields;
        const title=fval(ff,'Finding Title','Title','Name')||'Untitled Finding';
        const sev=(ff['Severity']||'').toUpperCase();
        const cat=fval(ff,'Category')||'';
        const aids=ff['Asset']||ff['Assets']||[];
        const aName=aids.length?(M.assets[aids[0]]?.fields['Asset Name']||M.assets[aids[0]]?.fields['Name']||'—'):'—';
        const status=fval(ff,'Status')||'Open';
        const barClass=sev==='CRITICAL'?'critical':sev==='HIGH'?'high':'moderate';
        const pClass=sev==='CRITICAL'?'pill-red':sev==='HIGH'?'pill-yellow':'';
        const catLabel=cat.toUpperCase()==='MECHANICAL'?'Equipment Issue — Schedule Repair':cat.toUpperCase()==='ENERGY'?'Efficiency Issue — Review Operation':cat;
        html+=`<div class="finding-row">
          <div class="finding-bar ${barClass}"></div>
          <div class="finding-content">
            <div class="finding-title">${title}</div>
            <div class="finding-cat"><span>Type:</span>${catLabel}&nbsp;&nbsp;<span>Asset:</span>${aName}&nbsp;&nbsp;<span>Status:</span>${status}</div>
          </div>
          ${pClass?`<span class="finding-pill ${pClass}">${sev.charAt(0)+sev.slice(1).toLowerCase()}</span>`:''}
        </div>`;
      });
    }
    html+=`</div></div></div>`;
  }

  // ── COMPLIANCE ──
  html+=`<div><div class="section-label">Compliance & Safety Status</div>
  <div class="status-section animate" style="animation-delay:0.6s">
    <div class="status-header">
      <div class="sh-title"><div class="status-dot ${expiredValves.length>0?'red':'green'}"></div>Relief Valve Compliance — ${expiredValves.length>0?'Action Required':'All Current'}</div>
      <div class="sh-count ${expiredValves.length>0?'red':'green'}">${expiredValves.length>0?expiredValves.length+' Expired':'All Current'}</div>
    </div>`;

  if(expiredValves.length>0) {
    html+=`<div class="plain-explain">
      <div class="pe-lbl">What This Means</div>
      <div class="pe-text">Relief valves protect pressure vessels from catastrophic failure. Expired valves are a life safety and regulatory compliance issue that must be resolved immediately to meet IIAR and OSHA requirements.</div>
    </div>`;
  }

  if(valves.length===0) {
    html+=`<div class="empty-msg">No relief valves tracked for this site yet</div>`;
  } else {
    html+=`<div style="padding:16px 20px">
      <div style="display:grid;grid-template-columns:80px 1fr 100px 90px;gap:8px;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px">
        <div style="font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase">Valve ID</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase">Protected Asset</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;text-align:center">Expiry Date</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;text-align:right">Status</div>
      </div>`;
    const sortedValves=[...expiredValves,...valves.filter(v=>{const exp=fval(v.fields,'Expiry Date','Expiration Date','Last Test Date');return !exp||new Date(exp)>=new Date();})];
    sortedValves.forEach(v=>{
      const vf=v.fields;
      const vid=fval(vf,'Valve I.D.','Valve ID','Name')||'—';
      const protectedAsset=vf['Protected Asset'];
      let aName='—';
      if(Array.isArray(protectedAsset)) {
        // It's a linked record - look up the name
        const aid=protectedAsset[0];
        aName=M.assets[aid]?.fields['Asset Name']||M.assets[aid]?.fields['Name']||aid||'—';
      } else if(protectedAsset) {
        aName=protectedAsset;
      }
      const expDate=fval(vf,'Expiration Date','Expiry Date','Last Test Date');
      const isExp=expDate&&new Date(expDate)<new Date();
      const od=isExp?yearsOverdue(expDate):null;
      html+=`<div class="valve-row">
        <div class="valve-id">${vid}</div>
        <div class="valve-asset">${aName}</div>
        <div class="valve-expiry">${fmtDate(expDate)}</div>
        ${isExp?`<div class="valve-status-expired">${od!==null?od+' YRS OVERDUE':'EXPIRED'}</div>`:(()=>{const st=(vf['Status']||'').toUpperCase();return st==='EXPIRING SOON'?`<div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--yellow);text-align:right;font-weight:700">⚠ EXPIRING SOON</div>`:`<div class="valve-status-ok">✓ CURRENT</div>`;})()}
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div></div>`;

  // ── SCORE IMPROVEMENT ROADMAP ──
  const actions=[];
  critFindings.forEach(fd=>{
    const title=fval(fd.fields,'Finding Title','Title','Name')||'Critical Finding';
    const rec=fval(fd.fields,'Recommended Action')||'Schedule immediate inspection and repair';
    const cost=fval(fd.fields,'Estimated Cost');
    actions.push({priority:'CRITICAL',text:title+' — '+rec,cost:cost?'Est. $'+cost:null,impact:4});
  });
  expiredValves.forEach(v=>{
    const vid=fval(v.fields,'Valve ID','Name')||'Relief Valve';
    const od=yearsOverdue(fval(v.fields,'Expiry Date','Expiration Date','Last Test Date'));
    actions.push({priority:'COMPLIANCE',text:`Replace ${vid} — Expired ${od?od+' years ago':''}. Required for PSM and OSHA compliance.`,cost:null,impact:2});
  });
  attentionAssets.forEach(a=>{
    const aName=fval(a.fields,'Asset Name','Name')||'Asset';
    const rec=fval(a.fields,'Recommended Action');
    if(rec) actions.push({priority:'SCHEDULED',text:`${aName} — ${rec}`,cost:null,impact:1});
  });

  if(actions.length>0&&plantScore!==null) {
    const potentialGain=Math.min(100-plantScore, actions.reduce((sum,a)=>sum+a.impact,0));
    const potentialScore=Math.round(plantScore+potentialGain);

    html+=`<div><div class="section-label">Score Improvement Roadmap</div>
    <div class="status-section animate" style="animation-delay:0.65s">
      <div class="status-header">
        <div class="sh-title"><div class="status-dot yellow"></div>Address These Issues to Improve Your Score</div>
        <div class="sh-count yellow">${actions.length} Action${actions.length>1?'s':''}</div>
      </div>
      <div class="plain-explain">
        <div class="pe-lbl">Your Score Potential</div>
        <div class="pe-text">Your current Plant Condition Score is <strong style="color:${scoreColor(plantScore)}">${Math.round(plantScore)}</strong>. By addressing the priority items below your score could reach an estimated <strong style="color:${scoreColor(potentialScore)}">${potentialScore}</strong> out of 100.</div>
      </div>`;

    actions.forEach(act=>{
      html+=`<div class="action-row" style="flex-direction:column;align-items:flex-start;gap:8px;padding:14px 20px">
        <div style="display:flex;align-items:center;gap:10px;width:100%">
          <span class="action-priority" style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px 10px;text-transform:uppercase;${act.priority==='CRITICAL'?'color:var(--red);border:1px solid rgba(232,50,10,0.4);background:var(--red-dim)':act.priority==='COMPLIANCE'?'color:var(--yellow);border:1px solid rgba(245,166,35,0.3);background:var(--yellow-dim)':'color:var(--text-mid);border:1px solid var(--border2)'}">${act.priority}</span>
          ${act.cost?`<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);font-weight:700;margin-left:auto">Estimated Cost: ${act.cost}</span>`:''}
        </div>
        <div style="font-size:14px;color:#dddddd;font-weight:500;line-height:1.5">${act.text}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // ── TREND HISTORY ──
  if(snapshots.length>0) {
    html+=`<div><div class="section-label">Plant Condition History — Score Trend</div>
    <div class="status-section animate" style="animation-delay:0.7s">
      <div class="status-header">
        <div class="sh-title">Historical Plant Condition Scores — ${name}</div>
      </div>
      <div style="padding:16px 20px">`;
    snapshots.forEach(sn=>{
      const snf=sn.fields;
      const snScore=fval(snf,'Plant Condition Score (New)','Plant Condition Score','Score');
      const snDate=fmtDate(fval(snf,'Date','Assessment Date'));
      const snColor=scoreColor(snScore);
      const snW=snScore!==null?Math.round(snScore):0;
      html+=`<div class="snap-row">
        <div class="snap-date">${snDate}</div>
        <div class="snap-score" style="color:${snColor}">${snScore!==null?Math.round(snScore):'—'}</div>
        <div class="snap-bar"><div class="snap-fill" style="width:${snW}%;background:${snColor}"></div></div>
        <span class="asset-status-pill ${pillClass(snScore)}" style="margin-left:12px">${scoreLabel(snScore)}</span>
      </div>`;
    });
    html+=`</div></div></div>`;
  }

  html+=`</main>`;
  $('dashboard-content').innerHTML=html;

  setTimeout(()=>{
    const ring=document.getElementById('main-ring');
    if(ring&&plantScore!==null){ring.style.transition='stroke-dashoffset 1.5s ease';ring.style.strokeDashoffset=String(534-(plantScore/100)*534);}
  },150);
}
</script>
</body>
</html>
