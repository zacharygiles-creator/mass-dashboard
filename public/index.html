<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASS Industrial — Plant Condition Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8320A;
    --red-dim: rgba(232,50,10,0.15);
    --yellow: #F5A623;
    --yellow-dim: rgba(245,166,35,0.15);
    --green: #2ECC71;
    --green-dim: rgba(46,204,113,0.12);
    --bg: #080808;
    --bg2: #0f0f0f;
    --bg3: #141414;
    --bg4: #1a1a1a;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #666;
    --text-mid: #999;
    --accent: #E8320A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-icon {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-icon span {
    display: block;
    background: var(--red);
    height: 2px;
  }

  .logo-icon span:nth-child(1) { width: 22px; }
  .logo-icon span:nth-child(2) { width: 14px; }
  .logo-icon span:nth-child(3) { width: 18px; }

  .logo-divider {
    width: 1px;
    height: 36px;
    background: var(--border2);
  }

  .logo-text .mass {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }

  .logo-text .industrial {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .report-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .report-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-mid);
  }

  /* ─── SITE BANNER ─── */
  .site-banner {
    position: relative;
    z-index: 5;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--red);
  }

  .site-info .site-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .site-info .site-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }

  .site-info .site-meta {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .site-meta span {
    color: var(--text-mid);
  }

  .program-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.3);
    padding: 6px 14px;
    text-transform: uppercase;
  }

  /* ─── MAIN LAYOUT ─── */
  main {
    position: relative;
    z-index: 5;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ─── SECTION LABEL ─── */
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── TOP ROW ─── */
  .top-row {
    display: grid;
    grid-template-columns: 280px 1fr 1fr;
    gap: 20px;
    align-items: start;
  }

  /* ─── PLANT CONDITION SCORE ─── */
  .score-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--yellow);
  }

  .score-card .card-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .score-ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .score-ring {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring .ring-bg {
    fill: none;
    stroke: var(--border2);
    stroke-width: 8;
  }

  .score-ring .ring-fill {
    fill: none;
    stroke: var(--yellow);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 376;
    stroke-dashoffset: 153;
    filter: drop-shadow(0 0 6px rgba(245,166,35,0.4));
    transition: stroke-dashoffset 1.5s ease;
  }

  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  .score-max {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .score-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--yellow);
    text-transform: uppercase;
    text-align: center;
  }

  .score-trend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ─── SYSTEM CARDS ─── */
  .system-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
  }

  .system-card .card-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .system-card .system-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 16px;
  }

  .system-score-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 16px;
  }

  .system-score-big {
    font-family: 'Orbitron', monospace;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
  }

  .system-score-big.attention { color: var(--yellow); }
  .system-score-big.critical { color: var(--red); }

  .system-score-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    padding-bottom: 10px;
  }

  .score-bar-wrap {
    margin-bottom: 16px;
  }

  .score-bar-track {
    height: 4px;
    background: var(--border2);
    width: 100%;
    position: relative;
  }

  .score-bar-fill {
    height: 100%;
    transition: width 1s ease;
  }

  .score-bar-fill.attention {
    background: var(--yellow);
    box-shadow: 0 0 8px rgba(245,166,35,0.5);
  }

  .score-bar-fill.critical {
    background: var(--red);
    box-shadow: 0 0 8px rgba(232,50,10,0.5);
  }

  .asset-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .asset-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 4px 8px;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .asset-chip.critical-asset {
    border-color: rgba(232,50,10,0.3);
    color: var(--red);
    background: var(--red-dim);
  }

  .asset-chip.attention-asset {
    border-color: rgba(245,166,35,0.3);
    color: var(--yellow);
    background: var(--yellow-dim);
  }

  /* ─── MIDDLE ROW ─── */
  .middle-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }

  /* ─── STAT CARD ─── */
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 20px 24px;
    position: relative;
  }

  .stat-card .card-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .stat-number {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-number.red { color: var(--red); }
  .stat-number.yellow { color: var(--yellow); }
  .stat-number.green { color: var(--green); }

  .stat-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 100%;
  }

  .stat-card.red-accent::after { background: var(--red); }
  .stat-card.yellow-accent::after { background: var(--yellow); }
  .stat-card.green-accent::after { background: var(--green); }

  /* ─── ASSET TABLE ─── */
  .asset-section {
    background: var(--bg2);
    border: 1px solid var(--border);
  }

  .asset-section-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .asset-section-header .title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .asset-table {
    width: 100%;
    border-collapse: collapse;
  }

  .asset-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: left;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .asset-table td {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .asset-table tr:last-child td { border-bottom: none; }

  .asset-table tr:hover td {
    background: rgba(255,255,255,0.02);
  }

  .asset-name-cell {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .criticality-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 3px 8px;
    text-transform: uppercase;
    display: inline-block;
  }

  .criticality-badge.CRITICAL {
    color: var(--red);
    border: 1px solid rgba(232,50,10,0.4);
    background: var(--red-dim);
  }

  .criticality-badge.MAJOR {
    color: var(--yellow);
    border: 1px solid rgba(245,166,35,0.3);
    background: var(--yellow-dim);
  }

  .criticality-badge.MODERATE {
    color: var(--text-mid);
    border: 1px solid var(--border2);
  }

  .health-score-cell {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
  }

  .health-score-cell.score-critical { color: var(--red); }
  .health-score-cell.score-attention { color: var(--yellow); }
  .health-score-cell.score-operational { color: var(--green); }

  .status-pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    text-transform: uppercase;
    display: inline-block;
  }

  .status-pill.CRITICAL {
    color: var(--red);
    border: 1px solid rgba(232,50,10,0.4);
    background: var(--red-dim);
  }

  .status-pill.ATTENTION {
    color: var(--yellow);
    border: 1px solid rgba(245,166,35,0.3);
    background: var(--yellow-dim);
  }

  .status-pill.OPERATIONAL {
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.3);
    background: var(--green-dim);
  }

  .mini-bar {
    width: 80px;
    height: 3px;
    background: var(--border2);
    position: relative;
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
  }

  .mini-bar-fill {
    height: 100%;
    position: absolute;
    left: 0; top: 0;
  }

  /* ─── TWO COL ─── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* ─── FINDINGS ─── */
  .findings-section {
    background: var(--bg2);
    border: 1px solid var(--border);
  }

  .section-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-header .title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .finding-row {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .finding-row:last-child { border-bottom: none; }

  .finding-severity-indicator {
    width: 3px;
    height: 40px;
    flex-shrink: 0;
  }

  .finding-severity-indicator.CRITICAL { background: var(--red); }
  .finding-severity-indicator.HIGH { background: var(--yellow); }

  .finding-content {
    flex: 1;
  }

  .finding-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
  }

  .finding-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .finding-meta span { color: var(--text-mid); margin-right: 12px; }

  /* ─── RELIEF VALVES ─── */
  .valve-grid {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .valve-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
  }

  .valve-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-mid);
    width: 70px;
  }

  .valve-asset {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    padding: 0 12px;
  }

  .valve-expiry {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    width: 80px;
    text-align: center;
  }

  .valve-overdue {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--red);
    width: 80px;
    text-align: right;
  }

  /* ─── COMPRESSOR ─── */
  .compressor-section {
    background: var(--bg2);
    border: 1px solid var(--border);
  }

  .reading-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    margin: 0;
  }

  .reading-cell {
    background: var(--bg3);
    padding: 16px 20px;
  }

  .reading-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .reading-value {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .reading-value.flag-yellow { color: var(--yellow); }
  .reading-value.flag-red { color: var(--red); }

  .reading-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .reading-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .reading-status.normal { color: var(--green); }
  .reading-status.attention { color: var(--yellow); }
  .reading-status.critical { color: var(--red); }

  /* ─── FOOTER ─── */
  footer {
    position: relative;
    z-index: 5;
    border-top: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    margin-top: 20px;
  }

  .footer-left {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .footer-right {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .score-card, .system-card, .stat-card, .asset-section,
  .findings-section, .compressor-section {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }

  .score-card { animation-delay: 0.1s; }
  .system-card:nth-child(2) { animation-delay: 0.2s; }
  .system-card:nth-child(3) { animation-delay: 0.3s; }
  .stat-card:nth-child(1) { animation-delay: 0.35s; }
  .stat-card:nth-child(2) { animation-delay: 0.4s; }
  .stat-card:nth-child(3) { animation-delay: 0.45s; }
  .asset-section { animation-delay: 0.5s; }
  .findings-section { animation-delay: 0.55s; }
  .compressor-section { animation-delay: 0.6s; }

  /* Component dots */
  .component-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .comp-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .comp-dot.ok { background: var(--green); }
  .comp-dot.degraded { background: var(--yellow); }
  .comp-dot.failed { background: var(--red); }

  .comp-legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .comp-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .comp-legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .snapshot-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .snapshot-row:last-child { border-bottom: none; }

  .snapshot-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    width: 100px;
  }

  .snapshot-score {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--yellow);
    width: 50px;
  }

  .snapshot-bar-track {
    flex: 1;
    height: 3px;
    background: var(--border2);
    position: relative;
  }

  .snapshot-bar-fill {
    height: 100%;
    background: var(--yellow);
    box-shadow: 0 0 6px rgba(245,166,35,0.4);
  }

  /* ─── SITE SELECTOR BAR ─── */
  .site-selector-bar {
    position:relative; z-index:9; background:var(--bg3);
    border-bottom:1px solid var(--border); padding:0 40px;
    display:flex; align-items:center; gap:0; height:48px;
  }
  .site-selector-label {
    font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px;
    color:var(--text-dim); text-transform:uppercase; margin-right:24px; white-space:nowrap;
  }
  .site-btn {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px;
    color:var(--text-dim); text-transform:uppercase; background:none; border:none;
    padding:0 20px; height:48px; cursor:pointer;
    border-right:1px solid var(--border); transition:all 0.15s ease;
    white-space:nowrap; position:relative;
  }
  .site-btn:first-of-type { border-left:1px solid var(--border); }
  .site-btn:hover { color:var(--text); background:rgba(255,255,255,0.03); }
  .site-btn.active { color:#fff; background:rgba(232,50,10,0.08); }
  .site-btn.active::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--red);
  }
  /* Score bar fill needs position */
  .score-bar-track { position: relative; }
  .score-bar-fill { position: absolute; top: 0; left: 0; }
  /* Spin animation */
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Score card top bar color variants */
  .score-card.operational::before { background: var(--green) !important; }
  .score-card.attention::before { background: var(--yellow) !important; }
  .score-card.critical-state::before { background: var(--red) !important; }
  /* Additional score colors */
  .system-score-big.operational { color: var(--green); }
  .score-bar-fill.operational { background: var(--green); box-shadow: 0 0 8px rgba(46,204,113,0.5); }
  .health-score-cell.score-operational { color: var(--green); }
  .mini-bar-fill.operational { background: var(--green); }
  .mini-bar-fill.attention { background: var(--yellow); }
  .mini-bar-fill.critical { background: var(--red); }
  /* Valve ok color */
  .valve-ok { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--green); text-align:right; }
  /* Reading status variants */
  .reading-status.critical-status { color: var(--red); }
  /* Empty state */
  .empty-state {
    padding:32px 24px; text-align:center; font-family:'Share Tech Mono',monospace;
    font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase;
  }
  /* Mini bar fill needs width to show */
  .mini-bar { position: relative; }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span></div>
    <div class="logo-divider"></div>
    <div class="logo-text">
      <div class="mass">MASS</div>
      <div class="industrial">Industrial</div>
    </div>
  </div>
  <div class="header-right">
    <div class="report-badge">Live Dashboard</div>
    <div class="report-date" id="header-date"></div>
  </div>
</header>

<div class="site-selector-bar" id="site-selector-bar">
  <div class="site-selector-label">Select Site</div>
  <div id="site-buttons" style="display:flex"></div>
</div>

<div class="site-banner" id="site-banner" style="display:none">
  <div class="site-info">
    <div class="site-label">Active Site</div>
    <div class="site-name" id="banner-name">—</div>
    <div class="site-meta" id="banner-meta"></div>
  </div>
  <div id="banner-badge"></div>
</div>

<div id="dashboard-content">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:16px;position:relative;z-index:5">
    <div style="width:40px;height:40px;border:2px solid #1e1e1e;border-top-color:#E8320A;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:3px;color:#666;text-transform:uppercase">Connecting to MASS Database</div>
  </div>
</div>

<footer>
  <div class="footer-left">MASS Industrial — Mechanical Assessment Scoring System — Confidential</div>
  <div class="footer-right" id="footer-right">Loading...</div>
</footer>


<script>
// ── UTILS ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function scoreClass(s) {
  if (s === null || s === undefined) return '';
  return s >= 80 ? 'operational' : s >= 60 ? 'attention' : 'critical';
}
function scoreLabel(s) {
  if (s === null || s === undefined) return 'No Data';
  return s >= 80 ? 'Operational' : s >= 60 ? 'Attention Required' : 'Critical';
}
function scorePill(s) {
  if (s === null || s === undefined) return '';
  return s >= 80 ? 'OPERATIONAL' : s >= 60 ? 'ATTENTION' : 'CRITICAL';
}
function ringColor(s) {
  if (s === null || s === undefined) return 'var(--text-dim)';
  return s >= 80 ? 'var(--green)' : s >= 60 ? 'var(--yellow)' : 'var(--red)';
}
function fmt(v, d=1) {
  if (v === null || v === undefined || v === '') return '—';
  return typeof v === 'number' ? v.toFixed(d) : v;
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'});
}
function yearsOverdue(s) {
  if (!s) return null;
  const d = new Date(s);
  if (d >= new Date()) return null;
  return Math.floor((new Date() - d) / (1000*60*60*24*365));
}
function buildMap(records) {
  const m = {};
  if (records) records.forEach(r => { m[r.id] = r; });
  return m;
}
function linkedName(ids, map, field='Name') {
  if (!ids || !ids.length) return '—';
  const r = map[ids[0]];
  return r ? (r.fields[field] || '—') : '—';
}
function fval(fields, ...keys) {
  for (const k of keys) {
    if (fields[k] !== undefined && fields[k] !== null && fields[k] !== '') return fields[k];
  }
  return null;
}

// ── STATE ──────────────────────────────────────────────────────
let D = null, M = {}, activeSite = null;

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  $('header-date').textContent = new Date().toLocaleDateString('en-US',{
    weekday:'short',year:'numeric',month:'short',day:'numeric'
  }).toUpperCase();

  try {
    const res = await fetch('/api/data');
    D = await res.json();
    M.sites     = buildMap(D.sites?.records);
    M.systems   = buildMap(D.systems?.records);
    M.assets    = buildMap(D.assets?.records);
    M.findings  = buildMap(D.findings?.records);
    M.valves    = buildMap(D.valves?.records);
    M.readings  = buildMap(D.readings?.records);
    M.components= buildMap(D.components?.records);
    M.snapshots = buildMap(D.snapshots?.records);
    M.customers = buildMap(D.customers?.records);
    buildSelector();
  } catch(e) {
    $('dashboard-content').innerHTML = `<div class="loading-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:16px;position:relative;z-index:5"><div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:3px;color:var(--red);text-transform:uppercase">Failed to load — check server connection</div></div>`;
  }
});

function buildSelector() {
  const sites = D.sites?.records || [];
  const container = $('site-buttons');
  sites.forEach((site,i) => {
    const btn = document.createElement('button');
    btn.className = 'site-btn';
    btn.textContent = site.fields['Name'] || site.fields['Site Name'] || 'Site '+(i+1);
    btn.dataset.id = site.id;
    btn.onclick = () => selectSite(site.id);
    container.appendChild(btn);
  });
  if (sites.length) selectSite(sites[0].id);
}

function selectSite(id) {
  activeSite = id;
  document.querySelectorAll('.site-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  const site = M.sites[id];
  if (!site) return;
  const f = site.fields;
  const name = fval(f,'Name','Site Name') || 'Site';
  const custIds = f['Customer'] || f['Customers'] || [];
  const cust = linkedName(custIds, M.customers, 'Name');
  const city = fval(f,'City','Location') || '';
  const state = fval(f,'State') || '';

  $('banner-name').textContent = name;
  $('banner-meta').innerHTML = `${cust !== '—' ? '<span>Customer:</span> '+cust+'&nbsp;&nbsp;' : ''}${city ? '<span>Location:</span> '+city+(state?', '+state:'') : ''}`;
  $('site-banner').style.display = 'flex';
  $('footer-right').textContent = `Generated ${new Date().toLocaleDateString('en-US')} — ${name} — v2.0`;

  renderDashboard(id);
}

function renderDashboard(siteId) {
  const site = M.sites[siteId];
  const f = site.fields;
  const name = fval(f,'Name','Site Name') || 'Site';

  // Plant score
  const plantScore = fval(f,'Plant Condition Score','Plant Score','Score');
  const sc = scoreClass(plantScore);
  const sl = scoreLabel(plantScore);
  const rc = ringColor(plantScore);
  const dashoff = plantScore !== null ? 376 - (plantScore/100)*376 : 376;
  const scoreDisp = plantScore !== null ? Math.round(plantScore) : '—';

  // Systems for this site
  const siteSystems = (D.systems?.records||[]).filter(s => {
    const linked = s.fields['Site'] || s.fields['Sites'] || [];
    return linked.includes(siteId);
  });
  const sysIds = siteSystems.map(s => s.id);

  // Assets
  const siteAssets = (D.assets?.records||[]).filter(a => {
    const linked = a.fields['System'] || a.fields['Systems'] || [];
    return linked.some(id => sysIds.includes(id));
  });
  const assetIds = siteAssets.map(a => a.id);

  // Findings (open only)
  const findings = (D.findings?.records||[]).filter(fd => {
    const linked = fd.fields['Site'] || fd.fields['Sites'] || [];
    const status = (fd.fields['Status']||'').toUpperCase();
    return linked.includes(siteId) && status !== 'RESOLVED';
  });

  // Valves
  const valves = (D.valves?.records||[]).filter(v => {
    const linked = v.fields['Asset'] || v.fields['Assets'] || [];
    return linked.some(id => assetIds.includes(id));
  });

  // Most recent reading per asset
  const readingMap = {};
  (D.readings?.records||[]).forEach(r => {
    const aids = r.fields['Asset'] || r.fields['Assets'] || [];
    aids.forEach(aid => {
      if (!assetIds.includes(aid)) return;
      const date = fval(r.fields,'Date','Reading Date') || '';
      if (!readingMap[aid] || date > (fval(readingMap[aid].fields,'Date','Reading Date')||'')) {
        readingMap[aid] = r;
      }
    });
  });

  // Snapshots
  const snapshots = (D.snapshots?.records||[]).filter(sn => {
    const linked = sn.fields['Site'] || sn.fields['Sites'] || [];
    return linked.includes(siteId);
  }).sort((a,b) => {
    const da = fval(a.fields,'Date','Assessment Date')||'';
    const db = fval(b.fields,'Date','Assessment Date')||'';
    return db > da ? 1 : -1;
  }).slice(0,5);

  // Stats
  const critFindings = findings.filter(fd => (fd.fields['Severity']||'').toUpperCase() === 'CRITICAL').length;
  const expiredValves = valves.filter(v => {
    const exp = fval(v.fields,'Expiration Date','Expiry Date','Last Test Date');
    return exp && new Date(exp) < new Date();
  }).length;

  let html = '<main>';

  // ── 01 OVERVIEW ──
  html += `<div><div class="section-label">01 — Plant Condition Overview</div><div class="top-row">`;

  // Score ring
  html += `<div class="score-card ${sc} animate" style="animation-delay:0.1s">
    <div class="card-label">Plant Condition Score</div>
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle class="ring-bg" cx="70" cy="70" r="60"/>
          <circle class="ring-fill" cx="70" cy="70" r="60"
            style="stroke:${rc};stroke-dashoffset:376"
            id="score-ring-fill"/>
        </svg>
        <div class="score-center">
          <div class="score-number">${scoreDisp}</div>
          <div class="score-max">/ 100</div>
        </div>
      </div>
      <div class="score-status" style="color:${rc}">${sl}</div>
    </div>
  </div>`;

  // First 2 systems
  siteSystems.slice(0,2).forEach((sys,i) => {
    const sf = sys.fields;
    const sysScore = fval(sf,'Weighted System Health Score','System Health Score','Score');
    const sysClass = scoreClass(sysScore);
    const sysName = fval(sf,'Name','System Name') || 'System';
    const sysCrit = fval(sf,'System Criticality','Criticality') || '';
    const bw = sysScore !== null ? Math.round(sysScore) : 0;
    const sv = sysScore !== null ? Math.round(sysScore) : '—';
    const sysAssets = siteAssets.filter(a => (a.fields['System']||a.fields['Systems']||[]).includes(sys.id));

    html += `<div class="system-card animate" style="animation-delay:${0.2+i*0.1}s">
      <div class="card-label">${sysCrit ? sysCrit+' CRITICALITY' : 'System'}</div>
      <div class="system-name">${sysName}</div>
      <div class="system-score-row">
        <div class="system-score-big ${sysClass}">${sv}</div>
        <div class="system-score-label">${scoreLabel(sysScore)}</div>
      </div>
      <div class="score-bar-wrap"><div class="score-bar-track" style="height:4px;background:var(--border2)">
        <div class="score-bar-fill ${sysClass}" style="width:${bw}%;height:100%"></div>
      </div></div>
      <div class="asset-chips">
        ${sysAssets.slice(0,8).map(a => {
          const asc = fval(a.fields,'Asset Health Score') ?? null;
          const chip = asc !== null && asc < 60 ? 'critical-asset' : asc !== null && asc < 80 ? 'attention-asset' : '';
          return `<span class="asset-chip ${chip}">${fval(a.fields,'Name')||'Asset'}</span>`;
        }).join('')}
        ${sysAssets.length > 8 ? `<span class="asset-chip">+${sysAssets.length-8} more</span>` : ''}
      </div>
    </div>`;
  });

  html += '</div></div>';

  // Extra system cards
  if (siteSystems.length > 2) {
    const extra = siteSystems.slice(2);
    html += `<div style="display:grid;grid-template-columns:repeat(${Math.min(extra.length,3)},1fr);gap:20px">`;
    extra.forEach((sys,i) => {
      const sf = sys.fields;
      const sysScore = fval(sf,'Weighted System Health Score','System Health Score','Score');
      const sysClass = scoreClass(sysScore);
      const sysName = fval(sf,'Name','System Name') || 'System';
      const sysCrit = fval(sf,'System Criticality','Criticality') || '';
      const bw = sysScore !== null ? Math.round(sysScore) : 0;
      const sv = sysScore !== null ? Math.round(sysScore) : '—';
      const sysAssets = siteAssets.filter(a => (a.fields['System']||a.fields['Systems']||[]).includes(sys.id));
      html += `<div class="system-card animate" style="animation-delay:${0.3+i*0.1}s">
        <div class="card-label">${sysCrit ? sysCrit+' CRITICALITY' : 'System'}</div>
        <div class="system-name">${sysName}</div>
        <div class="system-score-row">
          <div class="system-score-big ${sysClass}">${sv}</div>
          <div class="system-score-label">${scoreLabel(sysScore)}</div>
        </div>
        <div class="score-bar-wrap"><div class="score-bar-track" style="height:4px;background:var(--border2)">
          <div class="score-bar-fill ${sysClass}" style="width:${bw}%;height:100%"></div>
        </div></div>
        <div class="asset-chips">
          ${sysAssets.slice(0,6).map(a => {
            const asc = fval(a.fields,'Asset Health Score') ?? null;
            const chip = asc !== null && asc < 60 ? 'critical-asset' : asc !== null && asc < 80 ? 'attention-asset' : '';
            return `<span class="asset-chip ${chip}">${fval(a.fields,'Name')||'Asset'}</span>`;
          }).join('')}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  // ── 02 STATS ──
  html += `<div><div class="section-label">02 — Key Metrics</div>
    <div class="middle-row">
      <div class="stat-card ${critFindings > 0 ? 'red-accent' : 'green-accent'} animate" style="animation-delay:0.35s">
        <div class="card-label">Critical Findings</div>
        <div class="stat-number ${critFindings > 0 ? 'red' : 'green'}">${critFindings}</div>
        <div class="stat-sub">Open Critical Issues</div>
      </div>
      <div class="stat-card ${expiredValves > 0 ? 'red-accent' : 'green-accent'} animate" style="animation-delay:0.4s">
        <div class="card-label">Relief Valve Compliance</div>
        <div class="stat-number ${expiredValves > 0 ? 'red' : 'green'}">${expiredValves}</div>
        <div class="stat-sub">Expired Valves</div>
      </div>
      <div class="stat-card green-accent animate" style="animation-delay:0.45s">
        <div class="card-label">Assets Tracked</div>
        <div class="stat-number green">${siteAssets.length}</div>
        <div class="stat-sub">Total Site Assets</div>
      </div>
    </div>
  </div>`;

  // ── 03 ASSET TABLE ──
  const sortedAssets = [...siteAssets].sort((a,b) => {
    const sa = fval(a.fields,'Asset Health Score') ?? 999;
    const sb = fval(b.fields,'Asset Health Score') ?? 999;
    return sa - sb;
  });

  html += `<div><div class="section-label">03 — Asset Health Detail</div>
    <div class="asset-section animate" style="animation-delay:0.5s">
      <div class="asset-section-header">
        <div class="title">All Assets — ${name}</div>
        <span class="status-pill ${scorePill(plantScore)}">${siteAssets.length} Assets Tracked</span>
      </div>
      <table class="asset-table">
        <thead><tr>
          <th>Asset</th><th>System</th><th>Criticality</th><th>Health Score</th><th>Status</th>
        </tr></thead>
        <tbody>`;

  if (!sortedAssets.length) {
    html += `<tr><td colspan="5" style="text-align:center;padding:32px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase">No assets found for this site</td></tr>`;
  } else {
    sortedAssets.forEach(asset => {
      const af = asset.fields;
      const aName = fval(af,'Name') || 'Unknown';
      const crit = fval(af,'Criticality') || '—';
      const hs = fval(af,'Asset Health Score');
      const hc = scoreClass(hs);
      const hv = hs !== null ? Math.round(hs) : '—';
      const bw = hs !== null ? Math.round(hs) : 0;
      const sysLinked = af['System'] || af['Systems'] || [];
      const sysName = sysLinked.length ? (M.systems[sysLinked[0]]?.fields['Name']||'—') : '—';
      html += `<tr>
        <td class="asset-name-cell">${aName}</td>
        <td style="color:var(--text-mid);font-size:12px">${sysName}</td>
        <td><span class="criticality-badge ${crit.toUpperCase()}">${crit}</span></td>
        <td>
          <span class="health-score-cell score-${hc}">${hv}</span>
          <span class="mini-bar"><span class="mini-bar-fill ${hc}" style="width:${bw}%"></span></span>
        </td>
        <td><span class="status-pill ${scorePill(hs)}">${scoreLabel(hs)}</span></td>
      </tr>`;
    });
  }

  html += '</tbody></table></div></div>';

  // ── 04 FINDINGS + VALVES ──
  const sevOrder = {CRITICAL:0,HIGH:1,MODERATE:2,LOW:3};
  const sortedFindings = [...findings].sort((a,b) => {
    const sa = sevOrder[(a.fields['Severity']||'').toUpperCase()] ?? 9;
    const sb = sevOrder[(b.fields['Severity']||'').toUpperCase()] ?? 9;
    return sa - sb;
  });

  html += `<div><div class="section-label">04 — Findings &amp; Compliance</div><div class="two-col">`;

  // Findings panel
  html += `<div class="findings-section animate" style="animation-delay:0.55s">
    <div class="section-header">
      <div class="title">Active Findings</div>
      ${critFindings > 0 ? `<span class="status-pill CRITICAL" style="font-size:8px">${critFindings} Critical Open</span>` : `<span class="status-pill OPERATIONAL" style="font-size:8px">No Critical Issues</span>`}
    </div>`;

  if (!sortedFindings.length) {
    html += '<div class="empty-state">No open findings for this site</div>';
  } else {
    sortedFindings.forEach(fd => {
      const ff = fd.fields;
      const title = fval(ff,'Finding Title','Title','Name') || 'Finding';
      const sev = (ff['Severity']||'').toUpperCase();
      const cat = fval(ff,'Category') || '';
      const sub = fval(ff,'Finding Subcategory','Subcategory') || '';
      const stat = fval(ff,'Status') || 'Open';
      const aids = ff['Asset'] || ff['Assets'] || [];
      const aName = aids.length ? (M.assets[aids[0]]?.fields['Name']||'—') : '—';
      const pill = sev === 'CRITICAL' ? 'CRITICAL' : sev === 'HIGH' ? 'ATTENTION' : '';
      html += `<div class="finding-row">
        <div class="finding-severity-indicator ${sev}"></div>
        <div class="finding-content">
          <div class="finding-title">${title}</div>
          <div class="finding-meta">
            ${cat ? `<span>Category:</span>${cat}&nbsp;&nbsp;` : ''}
            ${sub ? `<span>Sub:</span>${sub}&nbsp;&nbsp;` : ''}
            <span>Asset:</span>${aName}&nbsp;&nbsp;
            <span>Status:</span>${stat}
          </div>
        </div>
        ${pill ? `<span class="status-pill ${pill}">${sev.charAt(0)+sev.slice(1).toLowerCase()}</span>` : ''}
      </div>`;
    });
  }
  html += '</div>';

  // Valves panel
  const expVlv = valves.filter(v => {
    const exp = fval(v.fields,'Expiration Date','Expiry Date','Last Test Date');
    return exp && new Date(exp) < new Date();
  });
  const curVlv = valves.filter(v => {
    const exp = fval(v.fields,'Expiration Date','Expiry Date','Last Test Date');
    return !exp || new Date(exp) >= new Date();
  });

  html += `<div class="findings-section animate" style="animation-delay:0.6s">
    <div class="section-header">
      <div class="title">Relief Valve Compliance</div>
      ${expVlv.length > 0 ? `<span class="status-pill CRITICAL" style="font-size:8px">${expVlv.length} Expired</span>` : `<span class="status-pill OPERATIONAL" style="font-size:8px">All Current</span>`}
    </div>`;

  if (!valves.length) {
    html += '<div class="empty-state">No relief valves tracked for this site</div>';
  } else {
    html += `<div class="valve-grid">
      <div style="display:grid;grid-template-columns:80px 1fr 90px 90px;gap:8px;padding:0 0 8px;border-bottom:1px solid var(--border)">
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase">Valve ID</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase">Protected Asset</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;text-align:center">Expiry</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;text-align:right">Status</div>
      </div>`;

    [...expVlv,...curVlv].forEach(v => {
      const vf = v.fields;
      const vid = fval(vf,'Valve ID','Name') || '—';
      const aids = vf['Asset'] || vf['Assets'] || [];
      const aName = aids.length ? (M.assets[aids[0]]?.fields['Name']||'—') : '—';
      const expDate = fval(vf,'Expiration Date','Expiry Date','Last Test Date');
      const isExp = expDate && new Date(expDate) < new Date();
      const od = isExp ? yearsOverdue(expDate) : null;
      html += `<div style="display:grid;grid-template-columns:80px 1fr 90px 90px;gap:8px;align-items:center;padding:10px 14px;background:var(--bg3);border:1px solid var(--border)">
        <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text-mid)">${vid}</div>
        <div style="font-size:12px;font-weight:500;color:var(--text)">${aName}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);text-align:center">${fmtDate(expDate)}</div>
        ${isExp ? `<div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--red);text-align:right">${od !== null ? od+' YRS' : 'EXPIRED'}</div>` : `<div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green);text-align:right">CURRENT</div>`}
      </div>`;
    });

    html += '</div>';
  }

  html += '</div></div></div>';

  // ── 05 COMPRESSOR READINGS ──
  const readingEntries = Object.entries(readingMap);
  if (readingEntries.length) {
    html += '<div><div class="section-label">05 — Compressor Operating Data</div>';

    readingEntries.forEach(([aid, reading]) => {
      const rf = reading.fields;
      const asset = M.assets[aid];
      const aName = fval(asset?.fields||{},'Name') || 'Compressor';
      const rDate = fmtDate(fval(rf,'Date','Reading Date'));
      const rScore = fval(rf,'Weighted Reading Score','Reading Score');
      const compType = (fval(asset?.fields||{},'Compressor Type','Type')||'').toUpperCase();
      const isRecip = compType.includes('RECIP');

      html += `<div class="compressor-section animate" style="animation-delay:0.65s;margin-bottom:20px">
        <div class="section-header">
          <div class="title">${aName} — Reading Analysis — ${rDate}</div>
          ${rScore !== null ? `<span class="status-pill ${scorePill(rScore)}">${scoreLabel(rScore)} — Score: ${Math.round(rScore)}</span>` : ''}
        </div>
        <div class="reading-grid">`;

      if (isRecip) {
        const ulStage = fval(rf,'Unloader Stage %','Unloader Stage');
        const mAmps = fval(rf,'Motor Amps at Stage','Motor Amps');
        const ulScore = fval(rf,'Unloader Amp Score');
        const ampStat = fval(rf,'Amp Status');
        const suctP = fval(rf,'Suction Pressure (PSIG)','Suction Pressure');
        const dischP = fval(rf,'Discharge Pressure (PSIG)','Discharge Pressure');
        const dischT = fval(rf,'Discharge Temp (°F)','Discharge Temp');
        const oilP = fval(rf,'Oil Pressure (PSIG)','Oil Pressure');
        const crkP = fval(rf,'Crankcase Pressure (PSIG)','Crankcase Pressure');
        const fla = fval(asset?.fields||{},'Motor FLA','FLA');
        const aFlag = ampStat === 'ABNORMAL — NOTIFY SUPERVISOR' ? 'flag-red' : '';
        const aStat = ampStat === 'NORMAL' ? 'normal' : ampStat ? 'critical-status' : '';

        html += `
          <div class="reading-cell"><div class="reading-label">Unloader Stage</div>
            <div class="reading-value">${ulStage !== null ? ulStage+'%' : '—'}</div>
            <div class="reading-unit">Capacity</div>
            <div class="reading-status normal">${ulStage !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Motor Amps</div>
            <div class="reading-value ${aFlag}">${mAmps !== null ? mAmps+'A' : '—'}</div>
            <div class="reading-unit">${fla ? 'FLA: '+fla+'A' : 'Amps'}</div>
            <div class="reading-status ${aStat}">${ampStat || (mAmps !== null ? 'Recorded' : 'No Data')}</div></div>
          <div class="reading-cell"><div class="reading-label">Suction Pressure</div>
            <div class="reading-value">${fmt(suctP)}</div>
            <div class="reading-unit">PSIG</div>
            <div class="reading-status normal">${suctP !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Discharge Pressure</div>
            <div class="reading-value">${fmt(dischP)}</div>
            <div class="reading-unit">PSIG</div>
            <div class="reading-status normal">${dischP !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Discharge Temp</div>
            <div class="reading-value">${fmt(dischT)}</div>
            <div class="reading-unit">°F</div>
            <div class="reading-status normal">${dischT !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Oil Pressure</div>
            <div class="reading-value">${fmt(oilP)}</div>
            <div class="reading-unit">PSIG</div>
            <div class="reading-status normal">${oilP !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Crankcase Pressure</div>
            <div class="reading-value">${fmt(crkP)}</div>
            <div class="reading-unit">PSIG</div>
            <div class="reading-status normal">${crkP !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Amp Score</div>
            <div class="reading-value ${ulScore !== null && ulScore < 60 ? 'flag-red' : ulScore !== null && ulScore < 80 ? 'flag-yellow' : 'flag-green'}">${ulScore !== null ? Math.round(ulScore) : '—'}</div>
            <div class="reading-unit">/ 100</div>
            <div class="reading-status ${ulScore !== null && ulScore >= 80 ? 'normal' : ulScore !== null && ulScore >= 60 ? 'attention' : 'critical-status'}">${scoreLabel(ulScore)}</div></div>`;
      } else {
        const suctP = fval(rf,'Suction Pressure','Suction Reading');
        const dischP = fval(rf,'Discharge Pressure');
        const dischT = fval(rf,'Discharge Temp','Discharge Temp (°F)');
        const mLoad = fval(rf,'Motor Load %','Motor Load');
        const sv = fval(rf,'Slide Valve %','Slide Valve');
        const oilDp = fval(rf,'Oil Filter ΔP','Oil ΔP','Net Oil Pressure');
        const oilM = fval(rf,'Oil Maintenance','Oil Maint');
        const filtM = fval(rf,'Filter Maintenance','Filter Maint');
        const mFlag = mLoad !== null && (mLoad < 50 || mLoad > 105) ? 'flag-yellow' : '';
        const mStat = mLoad !== null ? (mLoad < 50 ? 'attention' : mLoad > 105 ? 'critical-status' : 'normal') : '';

        html += `
          <div class="reading-cell"><div class="reading-label">Suction Pressure</div>
            <div class="reading-value">${fmt(suctP)}</div>
            <div class="reading-unit">${fval(rf,'Suction Units')||'PSIG'}</div>
            <div class="reading-status normal">${suctP !== null ? 'Normal' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Discharge Pressure</div>
            <div class="reading-value">${fmt(dischP)}</div>
            <div class="reading-unit">PSIG</div>
            <div class="reading-status normal">${dischP !== null ? 'Normal' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Discharge Temp</div>
            <div class="reading-value">${fmt(dischT)}</div>
            <div class="reading-unit">°F</div>
            <div class="reading-status normal">${dischT !== null ? 'Normal' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Motor Load</div>
            <div class="reading-value ${mFlag}">${mLoad !== null ? mLoad+'%' : '—'}</div>
            <div class="reading-unit">% of FLA</div>
            <div class="reading-status ${mStat}">${mLoad !== null ? (mLoad<50?'Underloaded':mLoad>105?'Overloaded':'Normal') : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Slide Valve</div>
            <div class="reading-value">${sv !== null ? sv+'%' : '—'}</div>
            <div class="reading-unit">Capacity</div>
            <div class="reading-status normal">${sv !== null ? 'Normal' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Net Oil Pressure</div>
            <div class="reading-value">${fmt(oilDp)}</div>
            <div class="reading-unit">PSID</div>
            <div class="reading-status normal">${oilDp !== null ? 'Normal' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Oil Service</div>
            <div class="reading-value" style="font-size:14px">${oilM !== null ? oilM : '—'}</div>
            <div class="reading-unit">Status</div>
            <div class="reading-status normal">${oilM !== null ? 'Recorded' : 'No Data'}</div></div>
          <div class="reading-cell"><div class="reading-label">Filter Service</div>
            <div class="reading-value" style="font-size:14px">${filtM !== null ? filtM : '—'}</div>
            <div class="reading-unit">Status</div>
            <div class="reading-status normal">${filtM !== null ? 'Recorded' : 'No Data'}</div></div>`;
      }

      html += '</div></div>';
    });
    html += '</div>';
  }

  // ── 06 HISTORY ──
  if (snapshots.length) {
    html += `<div><div class="section-label">06 — Plant Condition History</div>
      <div class="findings-section animate" style="animation-delay:0.7s">
        <div class="section-header">
          <div class="title">Plant Condition Snapshots — ${name}</div>
        </div>
        <div style="padding:20px 24px">`;

    snapshots.forEach(sn => {
      const snf = sn.fields;
      const snScore = fval(snf,'Plant Condition Score','Score');
      const snDate = fmtDate(fval(snf,'Date','Assessment Date'));
      const snc = scoreClass(snScore);
      const snColor = ringColor(snScore);
      const snW = snScore !== null ? Math.round(snScore) : 0;
      html += `<div class="snapshot-row">
        <div class="snapshot-date">${snDate}</div>
        <div class="snapshot-score" style="color:${snColor}">${snScore !== null ? Math.round(snScore) : '—'}</div>
        <div class="snapshot-bar-track" style="flex:1;height:3px;background:var(--border2)">
          <div style="width:${snW}%;height:100%;background:${snColor}"></div>
        </div>
        <span class="status-pill ${scorePill(snScore)}" style="margin-left:12px;font-size:8px">${scoreLabel(snScore)}</span>
      </div>`;
    });

    html += '</div></div></div>';
  }

  html += '</main>';
  $('dashboard-content').innerHTML = html;

  // Animate score ring
  setTimeout(() => {
    const ring = document.getElementById('score-ring-fill');
    if (ring && plantScore !== null) {
      ring.style.transition = 'stroke-dashoffset 1.5s ease';
      ring.style.strokeDashoffset = String(376 - (plantScore/100)*376);
    }
  }, 150);
}
</script>

</body>
</html>
